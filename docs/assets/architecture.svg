<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="760" height="360" fill="#0d1117"/>
  <text x="24" y="36" fill="#e6edf3" font-size="17" font-weight="700">Anchor - two deterministic hook layers</text>
  <text x="24" y="58" fill="#8b949e" font-size="12">enforcement runs in the harness, not at the model's discretion</text>

  <!-- user prompt -->
  <rect x="24" y="86" width="150" height="48" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="99" y="108" fill="#e6edf3" font-size="12" text-anchor="middle">user prompt</text>
  <text x="99" y="124" fill="#8b949e" font-size="10" text-anchor="middle">in YOLO mode</text>

  <!-- UserPromptSubmit -->
  <rect x="210" y="78" width="230" height="64" rx="6" fill="#11271b" stroke="#2ea043"/>
  <text x="325" y="100" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle">UserPromptSubmit | re-inject</text>
  <text x="325" y="118" fill="#8b949e" font-size="10" text-anchor="middle">block-tier rules re-stated every turn,</text>
  <text x="325" y="132" fill="#8b949e" font-size="10" text-anchor="middle">placed at end of context (recency)</text>

  <!-- model -->
  <rect x="476" y="86" width="120" height="48" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="536" y="114" fill="#e6edf3" font-size="12" text-anchor="middle">model</text>

  <!-- arrows row 1 -->
  <line x1="174" y1="110" x2="206" y2="110" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="440" y1="110" x2="472" y2="110" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- model emits tool call -->
  <line x1="536" y1="134" x2="536" y2="178" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="548" y="162" fill="#8b949e" font-size="10">tool call</text>

  <!-- PreToolUse -->
  <rect x="396" y="180" width="280" height="64" rx="6" fill="#2d1416" stroke="#f85149"/>
  <text x="536" y="202" fill="#f85149" font-size="12" font-weight="700" text-anchor="middle">PreToolUse | block</text>
  <text x="536" y="220" fill="#8b949e" font-size="10" text-anchor="middle">matches hard rule? deny before it runs.</text>
  <text x="536" y="234" fill="#8b949e" font-size="10" text-anchor="middle">deterministic - the model cannot override it</text>

  <!-- decision -->
  <line x1="396" y1="212" x2="300" y2="212" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="150" y="186" width="148" height="52" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="224" y="208" fill="#f85149" font-size="11" text-anchor="middle">DENY -> tool blocked</text>
  <text x="224" y="226" fill="#3fb950" font-size="11" text-anchor="middle">ALLOW -> tool runs</text>

  <!-- rules source -->
  <rect x="24" y="280" width="712" height="56" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="40" y="302" fill="#e6edf3" font-size="12" font-weight="700">.anchor.toml</text>
  <text x="40" y="320" fill="#8b949e" font-size="10">cascade: ~/.anchor/global | project (trust-on-first-use, can only strengthen) | plain-English rules -> compiled, tool-indexed</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8b949e"/>
    </marker>
  </defs>
</svg>
